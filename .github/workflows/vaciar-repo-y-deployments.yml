name: Vaciar repositorio y borrar deployments

on:
workflow_dispatch:
inputs:
environment:
description: "Environment de deployments a borrar"
required: true
default: "github-pages"

permissions:
contents: write
deployments: write

jobs:
limpiar:
runs-on: ubuntu-latest

```
steps:
  - name: Descargar repositorio
    uses: actions/checkout@v4

  - name: Borrar deployments del environment
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      ENV_NAME: ${{ inputs.environment }}
    run: |
      set -e

      echo "Repositorio: $REPO"
      echo "Environment: $ENV_NAME"

      mkdir -p tmp-deployments
      page=1
      found=0

      while true; do
        echo "Leyendo deployments página $page..."

        response=$(curl -sS -L \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/$REPO/deployments?environment=$ENV_NAME&per_page=100&page=$page")

        count=$(echo "$response" | jq 'length')

        if [ "$count" -eq 0 ]; then
          break
        fi

        echo "$response" > "tmp-deployments/page-$page.json"
        found=1
        page=$((page + 1))
      done

      if [ "$found" -eq 0 ]; then
        echo "No se encontraron deployments para borrar."
        exit 0
      fi

      jq -s 'add | sort_by(.created_at) | reverse' tmp-deployments/page-*.json > tmp-deployments/all.json

      total=$(jq 'length' tmp-deployments/all.json)
      echo "Deployments encontrados: $total"

      jq -r '.[].id' tmp-deployments/all.json | while read -r id; do
        if [ -z "$id" ]; then
          continue
        fi

        echo "Marcando como inactive deployment $id..."

        curl -sS -L -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/$REPO/deployments/$id/statuses" \
          -d "{\"state\":\"inactive\",\"environment\":\"$ENV_NAME\",\"description\":\"Cleanup before emptying repository\"}" \
          >/dev/null || true

        echo "Borrando deployment $id..."

        status=$(curl -sS -L -X DELETE \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/$REPO/deployments/$id" \
          -o /dev/null \
          -w "%{http_code}" || true)

        echo "Deployment $id -> HTTP $status"
      done

  - name: Vaciar repositorio y dejar solo README.md
    run: |
      set -e

      echo "Borrando todo excepto .git y README.md..."

      find . -mindepth 1 -maxdepth 1 \
        ! -name ".git" \
        ! -name "README.md" \
        -exec rm -rf {} +

      cat > README.md <<'EOF'
```

# RoqueObjetiva

Repositorio limpiado.

La versión anterior fue retirada del repositorio.
EOF

