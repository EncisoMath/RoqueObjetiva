name: Limpiar deployments viejos

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment a limpiar"
        required: true
        default: "github-pages"
      keep:
        description: "Cuantos deployments recientes conservar"
        required: true
        default: "1"

permissions:
  contents: read
  deployments: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Limpiar deployments antiguos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ENV_NAME: ${{ inputs.environment }}
          KEEP: ${{ inputs.keep }}
        run: |
          set -e

          echo "Repositorio: $REPO"
          echo "Environment: $ENV_NAME"
          echo "Conservar: $KEEP"

          mkdir -p tmp
          : > tmp/deployments.json

          page=1
          while true; do
            echo "Leyendo página $page..."

            response=$(curl -sS -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/deployments?environment=$ENV_NAME&per_page=100&page=$page")

            count=$(echo "$response" | jq 'length')

            if [ "$count" -eq 0 ]; then
              break
            fi

            echo "$response" > "tmp/page-$page.json"
            page=$((page + 1))
          done

          jq -s 'add | sort_by(.created_at) | reverse' tmp/page-*.json > tmp/all-deployments.json

          total=$(jq 'length' tmp/all-deployments.json)
          echo "Deployments encontrados: $total"

          if [ "$total" -le "$KEEP" ]; then
            echo "No hay deployments viejos para borrar."
            exit 0
          fi

          jq -r ".[$KEEP:] | .[].id" tmp/all-deployments.json | while read -r id; do
            if [ -z "$id" ]; then
              continue
            fi

            echo "Marcando inactive deployment $id..."

            curl -sS -L -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/deployments/$id/statuses" \
              -d "{\"state\":\"inactive\",\"environment\":\"$ENV_NAME\",\"description\":\"Cleanup old deployment\"}" \
              >/dev/null || true

            echo "Borrando deployment $id..."

            status=$(curl -sS -L -X DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/deployments/$id" \
              -o /dev/null \
              -w "%{http_code}")

            echo "Deployment $id -> HTTP $status"
          done

          echo "Limpieza terminada."
